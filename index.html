<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>try{var t=localStorage.getItem('theme')||'dark';var c=document.documentElement.classList;c.toggle('dark',t!=='light');c.toggle('light',t==='light');}catch(e){}</script>
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="shortcut icon" href="/icons/favicon.png" />
    <link rel="stylesheet" href="/styles/theme.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Folha - Sistema de Gestão</title>

    <!-- PWA Meta Tags -->

    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />

    <link rel="apple-touch-startup-image" href="/splash/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              slate: { 850: '#162031', 900: '#0f172a', 950: '#020617' },
              bg:            'rgb(var(--bg) / <alpha-value>)',
              surface:       'rgb(var(--surface) / <alpha-value>)',
              'surface-2':   'rgb(var(--surface-2) / <alpha-value>)',
              'surface-3':   'rgb(var(--surface-3) / <alpha-value>)',
              primary:       'rgb(var(--text) / <alpha-value>)',
              secondary:     'rgb(var(--text-2) / <alpha-value>)',
              muted:         'rgb(var(--text-3) / <alpha-value>)',
              line:          'rgb(var(--border) / <alpha-value>)',
              'line-strong': 'rgb(var(--border-strong) / <alpha-value>)',
              accent:        'rgb(var(--accent) / <alpha-value>)',
              success:       'rgb(var(--success) / <alpha-value>)',
              warning:       'rgb(var(--warning) / <alpha-value>)',
              danger:        'rgb(var(--danger) / <alpha-value>)',
              info:          'rgb(var(--info) / <alpha-value>)',
            }
          }
        }
      }
    </script>
    <style>
        body { background-color: rgb(var(--bg)); color: rgb(var(--text)); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        /* Remove setas de inputs numéricos */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Entrada dos toasts (Play CDN não inclui tailwindcss-animate) */
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .toast-in { animation: toastIn 180ms ease-out; }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

        // Em dev (localhost), o SW costuma causar cache "fantasma" e tela branca.
        // Então a gente garante que ele fique desativado nesse ambiente.
        if (isLocalhost) {
          navigator.serviceWorker.getRegistrations()
            .then((regs) => Promise.all(regs.map((r) => r.unregister())))
            .catch(() => {});
          return;
        }

        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('✅ SW registered:', reg.scope))
          .catch((err) => console.error('❌ SW failed:', err));
      });
    }
  </script>
</body>
</html>
