<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LA Music - Offline</title>
    <link rel="icon" type="image/png" href="/icons/favicon-32x32.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f1219 0%, #1a1f2e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 420px;
      }
      .avatar {
        width: 120px;
        height: 120px;
        margin: 0 auto 2rem;
        border-radius: 24px;
        border: 3px solid rgba(139, 92, 246, 0.6);
        overflow: hidden;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #8b5cf6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: #9ca3af;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }
      p {
        color: #d1d5db;
        margin-bottom: 2rem;
        line-height: 1.6;
        font-size: 0.95rem;
      }
      button {
        background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        color: #fff;
        border: none;
        padding: 1rem 1.25rem;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.28);
        width: 100%;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(139, 92, 246, 0.36);
      }
      button:active {
        transform: translateY(0);
      }
      .wifi {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="avatar">
        <img src="/icone-pwa-ana.png" alt="LA Music" />
      </div>
      <h1>LA Music</h1>
      <div class="subtitle">Sistema de Gestão</div>
      <div class="wifi">📡</div>
      <p>
        Você está sem conexão com a internet.<br />
        Verifique sua rede e tente novamente.
      </p>
      <button onclick="location.reload()">Reconectar</button>
    </div>
  </body>
</html>
